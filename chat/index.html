<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mac GPU Inference Chat</title>
<style>
  :root { --bg: #0f0f0f; --card: #1a1a1a; --border: #2a2a2a; --text: #e0e0e0; --accent: #4f9cf7; --user-bg: #1e3a5f; --bot-bg: #1a1a1a; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

  #header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 16px; font-weight: 600; }
  #header .status { font-size: 12px; color: #888; }
  #header .status.ok { color: #4ade80; }

  #config { padding: 12px 24px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: center; flex-shrink: 0; font-size: 13px; }
  #config label { color: #888; }
  #config input { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 4px; font-size: 13px; }
  #config input[type="text"] { width: 320px; }
  #config input[type="number"] { width: 64px; }

  #messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 75%; padding: 10px 14px; border-radius: 10px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: var(--user-bg); }
  .msg.bot { align-self: flex-start; background: var(--card); border: 1px solid var(--border); }
  .msg.error { align-self: center; background: #3a1a1a; color: #f87171; border: 1px solid #5a1a1a; font-size: 13px; }
  .msg.system { align-self: center; color: #666; font-size: 12px; }

  #input-area { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; flex-shrink: 0; }
  #input { flex: 1; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 14px; resize: none; outline: none; font-family: inherit; }
  #input:focus { border-color: var(--accent); }
  #send { background: var(--accent); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; white-space: nowrap; }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<div id="header">
  <h1>Mac GPU Inference Chat</h1>
  <span class="status" id="status">idle</span>
</div>

<div id="config">
  <label>API</label>
  <input type="text" id="api-url" value="" placeholder="http://localhost:8765">
  <label>Max Tokens</label>
  <input type="number" id="max-tokens" value="1024" min="1" max="2048">
  <label>Temperature</label>
  <input type="number" id="temperature" value="0" min="0" max="2" step="0.1">
</div>

<div id="messages">
  <div class="msg system">Model loaded on Mac GPU (MPS). Start chatting.</div>
</div>

<div id="input-area">
  <textarea id="input" rows="1" placeholder="Type a message..." autofocus></textarea>
  <button id="send">Send</button>
</div>

<script>
const $ = id => document.getElementById(id);
const messagesEl = $('messages');
const inputEl = $('input');
const sendBtn = $('send');
const statusEl = $('status');

function apiUrl() {
  let url = $('api-url').value.trim();
  if (!url) url = window.location.origin;
  return url.replace(/\/+$/, '');
}

function addMsg(text, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

async function send() {
  const prompt = inputEl.value.trim();
  if (!prompt) return;
  inputEl.value = '';
  addMsg(prompt, 'user');

  sendBtn.disabled = true;
  statusEl.textContent = 'generating...';
  statusEl.className = 'status';

  const botMsg = addMsg('...', 'bot');
  const t0 = performance.now();

  try {
    const resp = await fetch(apiUrl() + '/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt,
        max_tokens: parseInt($('max-tokens').value) || 128,
        temperature: parseFloat($('temperature').value) || 0,
      }),
    });
    const data = await resp.json();
    const elapsed = ((performance.now() - t0) / 1000).toFixed(1);

    if (data.error) {
      botMsg.textContent = data.error;
      botMsg.className = 'msg error';
    } else {
      botMsg.textContent = data.output;
      statusEl.textContent = `ok (${elapsed}s)`;
      statusEl.className = 'status ok';
    }
  } catch (e) {
    botMsg.textContent = 'Connection failed: ' + e.message;
    botMsg.className = 'msg error';
    statusEl.textContent = 'error';
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

sendBtn.onclick = send;
inputEl.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };

// auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
